<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin | ALLO KINÉ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container { margin-top: 120px; padding: 2rem; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: var(--nav-bg); color: white; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; }
        .en_attente { background: #f1c40f; color: #000; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Rendez-vous Patients</h1>
        <div id="appointments-list">
            <p>Chargement des données sécurisées...</p>
        </div>
    </div>

    <script>
        async function loadAppointments() {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html'; // Redirige si non connecté

            try {
                const response = await fetch('http://localhost:5000/api/appointments', {
                    headers: { 'x-auth-token': token }
                });
                const data = await response.json();
                
                let html = '<table><tr><th>Patient</th><th>Motif</th><th>Statut</th><th>Date</th></tr>';
                data.forEach(app => {
                    html += `<tr>
                        <td>${app.nom} ${app.prenom}</td>
                        <td>${app.motif}</td>
                        <td><span class="status-badge ${app.statut}">${app.statut}</span></td>
                        <td>${new Date(app.createdAt).toLocaleDateString()}</td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('appointments-list').innerHTML = html;
            } catch (error) {
                console.error("Erreur d'accès aux données.");
            }
        }
        loadAppointments();
    </script>
</body>
</html>
